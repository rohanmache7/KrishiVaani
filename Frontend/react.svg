import React, { useState, useEffect } from 'react';
import { 
  MapPin, 
  Sprout, 
  Calendar,
  Bell,
  Leaf,
  Users,
  AlertCircle,
  CheckCircle,
  Clock,
  ArrowUp,
  ArrowDown,
  Eye,
  Zap,
  Tractor,
  Wheat,
  Droplets,
  Sun,
  Shield,
  ListTodo,
  CheckSquare,
  Newspaper,
  ExternalLink,
  ChevronLeft,
  ChevronRight
} from 'lucide-react';
import { useAuth } from './contexts/AuthContext';

const API_URL = 'http://localhost:5001/api/KrishiVaani';

const ModernFarmDashboard = () => {
  const [newsData, setNewsData] = useState([]);
  const [currentNewsIndex, setCurrentNewsIndex] = useState(0);
  const [isLoading, setIsLoading] = useState(true);
  const [newsError, setNewsError] = useState(null);
  const [user,setUser] = useState([])
  const {currentUser} = useAuth();
  const userEmail = currentUser.email;

  useEffect(() => {
      const fetchUserData = async () => {
        try {
          setIsLoading(true);
        
  
          const response = await fetch(`${API_URL}?email=${userEmail}`);
          if (!response.ok) {
            throw new Error('Failed to fetch user data');
          }
          const data = await response.json();
          setUser(data);
        } catch (err) {
          console.log("Error fetching user data:", err);
          setError("Could not load user data. Please check your network and try again.");
        } finally {
          setIsLoading(false);
        }
      };
  
      if (userEmail) {
        fetchUserData();
      }
    }, [userEmail]);

  // Agricultural images from Pexels for news backgrounds
  const agriculturalImages = [
    'https://images.pexels.com/photos/2132227/pexels-photo-2132227.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
    'https://images.pexels.com/photos/1595104/pexels-photo-1595104.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
    'https://images.pexels.com/photos/1409999/pexels-photo-1409999.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
    'https://images.pexels.com/photos/2132200/pexels-photo-2132200.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
    'https://images.pexels.com/photos/1573160/pexels-photo-1573160.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
    'https://images.pexels.com/photos/1595108/pexels-photo-1595108.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
    'https://images.pexels.com/photos/2518861/pexels-photo-2518861.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
    'https://images.pexels.com/photos/1459340/pexels-photo-1459340.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'
  ];

  // Mock user data




  // Fetch agricultural news for India
  useEffect(() => {
    const fetchNews = async () => {
      try {
        setIsLoading(true);
        const response = await fetch(
          'https://newsdata.io/api/1/latest?apikey=pub_5026a77efe9b4164a53289de8e84494b&q=agriculture&country=in&language=en&category=business,politics,environment'
        );
        
        if (!response.ok) {
          throw new Error('Failed to fetch news');
        }
        
        const data = await response.json();
        const newsWithImages = (data.results || []).map((article, index) => ({
          ...article,
          backgroundImage: agriculturalImages[index % agriculturalImages.length]
        }));
        setNewsData(newsWithImages);
        setNewsError(null);
      } catch (error) {
        console.error('Error fetching news:', error);
        setNewsError(error.message);
        // Fallback mock data for demonstration
        setNewsData([
          {
            title: "Government announces new agricultural subsidy scheme for farmers",
            description: "The central government has announced a comprehensive subsidy scheme to support farmers across India with better access to seeds, fertilizers, and modern farming equipment.",
            link: "#",
            pubDate: "2024-01-15",
            source_name: "Agriculture Today",
            backgroundImage: agriculturalImages[0]
          },
          {
            title: "Organic farming practices show promising results in Punjab",
            description: "Farmers in Punjab are experiencing increased yields and better soil health through organic farming methods, leading to sustainable agriculture practices.",
            link: "#",
            pubDate: "2024-01-14",
            source_name: "Farm News India",
            backgroundImage: agriculturalImages[1]
          },
          {
            title: "New irrigation technology reduces water consumption by 40%",
            description: "Advanced drip irrigation systems are helping Indian farmers conserve water while maintaining optimal crop yields in drought-prone regions.",
            link: "#",
            pubDate: "2024-01-13",
            source_name: "Agricultural Tribune",
            backgroundImage: agriculturalImages[2]
          },
          {
            title: "Smart farming solutions boost crop yields across India",
            description: "Implementation of IoT sensors and AI-driven analytics is helping farmers make data-driven decisions for better crop management and increased productivity.",
            link: "#",
            pubDate: "2024-01-12",
            source_name: "Modern Farming",
            backgroundImage: agriculturalImages[3]
          },
          {
            title: "Climate-resilient crops help farmers adapt to changing weather",
            description: "Development of drought and flood-resistant crop varieties is enabling farmers to maintain stable yields despite unpredictable weather patterns.",
            link: "#",
            pubDate: "2024-01-11",
            source_name: "Climate Agriculture",
            backgroundImage: agriculturalImages[4]
          }
        ]);
      } finally {
        setIsLoading(false);
      }
    };

    fetchNews();
  }, []);

  // Auto-scroll functionality for news
  useEffect(() => {
    if (newsData.length > 0) {
      const interval = setInterval(() => {
        setCurrentNewsIndex((prevIndex) => 
          prevIndex === newsData.length - 1 ? 0 : prevIndex + 1
        );
      }, 8000); // Change news every 8 seconds (increased for better reading time)

      return () => clearInterval(interval);
    }
  }, [newsData.length]);

  const nextNews = () => {
    setCurrentNewsIndex((prevIndex) => 
      prevIndex === newsData.length - 1 ? 0 : prevIndex + 1
    );
  };

  const prevNews = () => {
    setCurrentNewsIndex((prevIndex) => 
      prevIndex === 0 ? newsData.length - 1 : prevIndex - 1
    );
  };

  // Mock data relevant to Indian farming
  const recentActivities = [
    { id: 1, action: 'Irrigation completed in Field A-3', time: '2 hours ago', status: 'completed', icon: 'droplet' },
    { id: 2, action: 'Fertilizer applied to wheat field', time: '1 day ago', status: 'completed', icon: 'leaf' },
    { id: 3, action: 'Pesticide spraying scheduled', time: '2 days ago', status: 'pending', icon: 'alert' },
    { id: 4, action: 'Rice harvesting planned', time: '3 days ago', status: 'scheduled', icon: 'calendar' }
  ];

  const weeklyTasks = [
    { id: 1, task: 'Check irrigation system in Field A-2', dueDate: 'Today', priority: 'high', completed: false },
    { id: 2, task: 'Apply organic fertilizer to wheat crop', dueDate: 'Tomorrow', priority: 'medium', completed: false },
    { id: 3, task: 'Inspect rice crop for pest damage', dueDate: 'Wednesday', priority: 'high', completed: true },
    { id: 4, task: 'Service tractor engine', dueDate: 'Thursday', priority: 'medium', completed: false },
    { id: 5, task: 'Purchase seeds for next season', dueDate: 'Friday', priority: 'low', completed: false },
    { id: 6, task: 'Clean storage facility', dueDate: 'Saturday', priority: 'low', completed: true }
  ];

  const quickStats = [
    { label: 'Crop Health', value: '94%', change: '+2%', trend: 'up', color: 'green' },
    { label: 'Equipment Status', value: '4/5', change: '+1', trend: 'up', color: 'purple' },
    { label: 'Seed Stock', value: '85%', change: '+5%', trend: 'up', color: 'orange' }
  ];

  const toggleTaskComplete = (taskId) => {
    console.log(`Toggle task ${taskId}`);
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-green-50 relative overflow-hidden">
      {/* Background decorative elements */}
      <div className="absolute top-0 left-0 w-72 h-72 bg-gradient-to-br from-green-200/30 to-emerald-300/20 rounded-full blur-3xl -translate-x-36 -translate-y-36"></div>
      <div className="absolute top-0 right-0 w-96 h-96 bg-gradient-to-br from-blue-200/20 to-cyan-300/20 rounded-full blur-3xl translate-x-48 -translate-y-48"></div>
      <div className="absolute bottom-0 left-1/2 w-80 h-80 bg-gradient-to-br from-purple-200/20 to-pink-300/20 rounded-full blur-3xl translate-y-40"></div>
<main>
     <div className="space-y-6">
            {/* Welcome Card */}
            <div className="bg-gradient-to-r from-green-600 to-black rounded-2xl p-8 text-white shadow-lg">
              <h1 className="text-3xl font-bold mb-2">Welcome, {currentUser.displayName}!</h1>
              <p className="text-white opacity-90 text-lg">
                Today is a good day for farming. Ready to take care of your farm.
              </p>
            </div>

          {/* Agricultural News Section */}
          <div className="relative rounded-3xl overflow-hidden shadow-2xl border border-emerald-500/20">
            {newsData.length > 0 && (
              <div 
                className="absolute inset-0 bg-cover bg-center bg-no-repeat"
                style={{ 
                  backgroundImage: `url(${newsData[currentNewsIndex]?.backgroundImage})`,
                }}
              >
                <div className="absolute inset-0 bg-gradient-to-br from-emerald-900/75 via-green-800/70 to-teal-900/75"></div>
                <div className="absolute inset-0 bg-gradient-to-t from-black/30 via-transparent to-transparent"></div>
              </div>
            )}
            
            <div className="relative z-10 p-8 text-white">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-2xl font-bold flex items-center">
                  <div className="p-3 bg-white/20 backdrop-blur-sm rounded-xl mr-4 border border-white/20">
                    <Newspaper className="h-8 w-8 text-white" />
                  </div>
                  Agricultural News - India
                  <span className="ml-4 bg-white/20 backdrop-blur-sm rounded-full px-4 py-2 text-sm font-medium border border-white/20">
                    Latest Updates
                  </span>
                </h2>
                <div className="flex items-center space-x-2">
                  <button 
                    onClick={prevNews}
                    className="p-2 bg-white/20 backdrop-blur-sm rounded-xl hover:bg-white/30 transition-all duration-300 border border-white/20"
                  >
                    <ChevronLeft className="h-5 w-5" />
                  </button>
                  <button 
                    onClick={nextNews}
                    className="p-2 bg-white/20 backdrop-blur-sm rounded-xl hover:bg-white/30 transition-all duration-300 border border-white/20"
                  >
                    <ChevronRight className="h-5 w-5" />
                  </button>
                </div>
              </div>

              {isLoading ? (
                <div className="bg-white/20 backdrop-blur-md rounded-2xl p-8 border border-white/20 shadow-lg">
                  <div className="flex items-center justify-center space-x-3">
                    <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-white"></div>
                    <p className="text-white/80 font-medium">Loading latest agricultural news...</p>
                  </div>
                </div>
              ) : newsError ? (
                <div className="bg-white/20 backdrop-blur-md rounded-2xl p-8 border border-white/20 shadow-lg">
                  <div className="flex items-center justify-center space-x-3 text-white/80">
                    <AlertCircle className="h-6 w-6" />
                    <p className="font-medium">Unable to load news. Showing sample content.</p>
                  </div>
                </div>
              ) : null}

              {newsData.length > 0 && (
                <div className="bg-white/15 backdrop-blur-lg rounded-2xl p-8 border border-white/20 shadow-2xl">
                  <div className="relative overflow-hidden">
                    <div 
                      className="flex transition-transform duration-500 ease-in-out"
                      style={{ transform: `translateX(-${currentNewsIndex * 100}%)` }}
                    >
                      {newsData.map((article, index) => (
                        <div key={index} className="w-full flex-shrink-0">
                          <div className="space-y-6">
                            <div className="flex items-center justify-between">
                              <span className="bg-white/25 backdrop-blur-sm rounded-full px-4 py-2 text-sm font-medium border border-white/30">
                                {article.source_name || 'Agricultural News'}
                              </span>
                              <span className="text-white/80 text-sm font-medium">
                                {article.pubDate ? new Date(article.pubDate).toLocaleDateString('en-IN') : 'Recent'}
                              </span>
                            </div>
                            <h3 className="text-2xl font-bold leading-relaxed text-white">
                              {article.title}
                            </h3>
                            <p className="text-emerald-100 text-base leading-relaxed">
                              {article.description}
                            </p>
                            {article.link && article.link !== '#' && (
                              <a 
                                href={article.link} 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center space-x-2 bg-white/25 backdrop-blur-sm rounded-xl px-6 py-3 hover:bg-white/35 transition-all duration-300 border border-white/30 text-sm font-medium shadow-lg hover:shadow-xl hover:-translate-y-0.5"
                              >
                                <span>Read Full Article</span>
                                <ExternalLink className="h-4 w-4" />
                              </a>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                    
                    {/* News Indicators */}
                    <div className="flex justify-center space-x-2 mt-8">
                      {newsData.map((_, index) => (
                        <button
                          key={index}
                          onClick={() => setCurrentNewsIndex(index)}
                          className={`w-3 h-3 rounded-full transition-all duration-300 ${
                            index === currentNewsIndex 
                              ? 'bg-white shadow-lg scale-125' 
                              : 'bg-white/40 hover:bg-white/60 hover:scale-110'
                          }`}
                        />
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Quick Stats */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
            {quickStats.map((stat, index) => (
              <div key={index} className="relative bg-white/70 backdrop-blur-lg rounded-2xl p-8 border border-white/50 hover:bg-white/80 transition-all duration-500 group shadow-lg hover:shadow-2xl hover:-translate-y-1">
                <div className="absolute inset-0 bg-gradient-to-br from-white/60 to-transparent rounded-2xl"></div>
                <div className="relative">
                  <div className="flex items-center justify-between mb-6">
                    <div className={`p-4 rounded-2xl shadow-lg ${
                      stat.color === 'green' ? 'bg-gradient-to-br from-emerald-100 to-green-100 border border-green-200' :
                      stat.color === 'purple' ? 'bg-gradient-to-br from-purple-100 to-violet-100 border border-purple-200' : 
                      'bg-gradient-to-br from-orange-100 to-amber-100 border border-orange-200'
                    } group-hover:scale-110 transition-transform duration-300`}>
                      {stat.color === 'green' && <Leaf className="h-7 w-7 text-emerald-600" />}
                      {stat.color === 'purple' && <Tractor className="h-7 w-7 text-purple-600" />}
                      {stat.color === 'orange' && <Wheat className="h-7 w-7 text-orange-600" />}
                    </div>
                    <div className={`flex items-center space-x-2 px-3 py-1 rounded-full ${stat.trend === 'up' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-red-50 text-red-700 border border-red-200'}`}>
                      {stat.trend === 'up' ? <ArrowUp className="h-4 w-4" /> : <ArrowDown className="h-4 w-4" />}
                      <span className="text-sm font-bold">{stat.change}</span>
                    </div>
                  </div>
                  <div>
                    <p className="text-sm text-gray-600 mb-2 font-medium">{stat.label}</p>
                    <p className="text-3xl font-bold text-gray-900">{stat.value}</p>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Main Content Grid */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
            {/* Farm Overview */}
            <div className="lg:col-span-2 space-y-8">
              {/* Farm Info Cards */}
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="relative bg-white/70 backdrop-blur-lg rounded-2xl p-6 border border-white/50 hover:bg-white/80 hover:-translate-y-2 transition-all duration-500 group shadow-lg hover:shadow-2xl">
                  <div className="absolute inset-0 bg-gradient-to-br from-green-50/50 to-transparent rounded-2xl"></div>
                  <div className="relative">
                    <div className="flex items-center justify-between mb-4">
                      <div>
                        <p className="text-sm text-gray-600 mb-2 font-medium">Total Land Area</p>
                        <p className="text-2xl font-bold text-gray-900">{user.landArea} Acres</p>
                        <p className="text-xs text-emerald-600 mt-1 font-semibold">+0.5 acres this year</p>
                      </div>
                      <div className="p-3 bg-gradient-to-br from-emerald-100 to-green-100 rounded-2xl border border-emerald-200 group-hover:scale-110 transition-transform duration-300">
                        <MapPin className="h-8 w-8 text-emerald-600" />
                      </div>
                    </div>
                    <div className="mt-4 bg-gradient-to-br from-emerald-50 to-green-50 rounded-xl p-4 border border-emerald-100">
                      <div className="flex justify-between text-sm mb-2">
                        <span className="text-gray-600 font-medium">Cultivable</span>
                        <span className="font-bold text-emerald-600">90%</span>
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-3">
                        <div className="bg-gradient-to-r from-emerald-400 to-green-500 h-3 rounded-full shadow-sm" style={{width: '90%'}}></div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="relative bg-white/70 backdrop-blur-lg rounded-2xl p-6 border border-white/50 hover:bg-white/80 hover:-translate-y-2 transition-all duration-500 group shadow-lg hover:shadow-2xl">
                  <div className="absolute inset-0 bg-gradient-to-br from-blue-50/50 to-transparent rounded-2xl"></div>
                  <div className="relative">
                    <div className="flex items-center justify-between mb-4">
                      <div>
                        <p className="text-sm text-gray-600 mb-2 font-medium">Main Crops</p>
                        <p className="text-sm font-semibold text-gray-900">
                          {user.cropsToPlant?.join(', ') || 'N/A'}
                        </p>
                        <p className="text-xs text-blue-600 mt-1 font-semibold">3 varieties planted</p>
                      </div>
                      <div className="p-3 bg-gradient-to-br from-blue-100 to-cyan-100 rounded-2xl border border-blue-200 group-hover:scale-110 transition-transform duration-300">
                        <Sprout className="h-8 w-8 text-blue-600" />
                      </div>
                    </div>
                    <div className="mt-4 space-y-3">
                      {user.cropsToPlant?.map((crop, index) => (
                        <div key={index} className="flex justify-between items-center text-sm bg-white/50 p-2 rounded-lg">
                          <span className="text-gray-700 font-medium">{crop}</span>
                          <span className="bg-gradient-to-r from-emerald-100 to-green-100 text-emerald-800 px-3 py-1 rounded-full text-xs font-semibold border border-emerald-200">Growing</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="relative bg-white/70 backdrop-blur-lg rounded-2xl p-6 border border-white/50 hover:bg-white/80 hover:-translate-y-2 transition-all duration-500 group shadow-lg hover:shadow-2xl">
                  <div className="absolute inset-0 bg-gradient-to-br from-purple-50/50 to-transparent rounded-2xl"></div>
                  <div className="relative">
                    <div className="flex items-center justify-between mb-4">
                      <div>
                        <p className="text-sm text-gray-600 mb-2 font-medium">Crop Protection</p>
                        <p className="text-lg font-semibold text-gray-900">Good Status</p>
                        <p className="text-xs text-purple-600 mt-1 font-semibold">Pest Control: Active</p>
                      </div>
                      <div className="p-3 bg-gradient-to-br from-purple-100 to-violet-100 rounded-2xl border border-purple-200 group-hover:scale-110 transition-transform duration-300">
                        <Shield className="h-8 w-8 text-purple-600" />
                      </div>
                    </div>
                    <div className="mt-4 grid grid-cols-2 gap-3">
                      <div className="bg-gradient-to-br from-emerald-50 to-green-50 rounded-xl p-3 text-center border border-emerald-100">
                        <p className="text-xs text-gray-600 font-medium">Pesticide</p>
                        <p className="text-sm font-bold text-emerald-600">Sufficient</p>
                      </div>
                      <div className="bg-gradient-to-br from-blue-50 to-cyan-50 rounded-xl p-3 text-center border border-blue-100">
                        <p className="text-xs text-gray-600 font-medium">Fertilizer</p>
                        <p className="text-sm font-bold text-blue-600">Available</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Quick Actions */}
              <div className="relative bg-white/70 backdrop-blur-lg rounded-2xl p-8 border border-white/50 shadow-lg">
                <div className="absolute inset-0 bg-gradient-to-br from-white/60 to-transparent rounded-2xl"></div>
                <div className="relative">
                  <h3 className="text-xl font-bold text-gray-900 mb-6 flex items-center">
                    <div className="p-2 bg-gradient-to-br from-yellow-100 to-amber-100 rounded-xl mr-3 border border-yellow-200">
                      <Zap className="h-6 w-6 text-yellow-600" />
                    </div>
                    Quick Actions
                  </h3>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                    {[
                      { label: 'Start Irrigation', icon: Droplets, color: 'blue' },
                      { label: 'Apply Fertilizer', icon: Leaf, color: 'green' },
                      { label: 'Book Tractor', icon: Tractor, color: 'orange' },
                      { label: 'View Reports', icon: Eye, color: 'purple' }
                    ].map((action, index) => (
                      <button
                        key={index}
                        className={`relative p-6 rounded-2xl border-2 transition-all duration-300 group hover:-translate-y-1 shadow-md hover:shadow-lg ${
                          action.color === 'blue' ? 'border-blue-200 bg-gradient-to-br from-blue-50 to-cyan-50 hover:from-blue-100 hover:to-cyan-100' :
                          action.color === 'green' ? 'border-emerald-200 bg-gradient-to-br from-emerald-50 to-green-50 hover:from-emerald-100 hover:to-green-100' :
                          action.color === 'orange' ? 'border-orange-200 bg-gradient-to-br from-orange-50 to-amber-50 hover:from-orange-100 hover:to-amber-100' :
                          'border-purple-200 bg-gradient-to-br from-purple-50 to-violet-50 hover:from-purple-100 hover:to-violet-100'
                        }`}
                      >
                        <div className="absolute inset-0 bg-white/30 rounded-2xl"></div>
                        <div className="relative">
                          <action.icon className={`h-8 w-8 ${
                            action.color === 'blue' ? 'text-blue-600' :
                            action.color === 'green' ? 'text-emerald-600' :
                            action.color === 'orange' ? 'text-orange-600' :
                            'text-purple-600'
                          } mx-auto mb-3 group-hover:scale-110 transition-transform duration-300`} />
                          <p className="text-sm font-bold text-gray-700">{action.label}</p>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              {/* This Week's Tasks */}
              <div className="relative bg-white/70 backdrop-blur-lg rounded-2xl p-8 border border-white/50 shadow-lg">
                <div className="absolute inset-0 bg-gradient-to-br from-white/60 to-transparent rounded-2xl"></div>
                <div className="relative">
                  <h3 className="text-xl font-bold text-gray-900 mb-6 flex items-center">
                    <div className="p-2 bg-gradient-to-br from-indigo-100 to-blue-100 rounded-xl mr-3 border border-indigo-200">
                      <ListTodo className="h-6 w-6 text-indigo-600" />
                    </div>
                    This Week's Tasks
                    <span className="ml-3 bg-gradient-to-r from-indigo-100 to-blue-100 text-indigo-800 px-3 py-1 rounded-full text-xs font-semibold border border-indigo-200">
                      {weeklyTasks.filter(task => !task.completed).length} pending
                    </span>
                  </h3>
                  <div className="space-y-4 max-h-80 overflow-y-auto">
                    {weeklyTasks.map((task) => (
                      <div key={task.id} className={`relative bg-white/50 backdrop-blur-sm p-4 rounded-xl border border-white/50 hover:bg-white/70 transition-all duration-300 group ${task.completed ? 'opacity-75' : ''}`}>
                        <div className="flex items-start space-x-4">
                          <button
                            onClick={() => toggleTaskComplete(task.id)}
                            className={`mt-1 p-1 rounded-lg transition-all duration-300 ${
                              task.completed 
                                ? 'bg-emerald-100 text-emerald-600 border border-emerald-200' 
                                : 'bg-gray-100 text-gray-400 border border-gray-200 hover:bg-emerald-50 hover:text-emerald-500'
                            }`}
                          >
                            <CheckSquare className="h-4 w-4" />
                          </button>
                          <div className="flex-1">
                            <p className={`text-sm font-semibold mb-2 ${task.completed ? 'text-gray-500 line-through' : 'text-gray-900'}`}>
                              {task.task}
                            </p>
                            <div className="flex items-center space-x-4">
                              <span className="text-xs text-gray-500 flex items-center">
                                <Calendar className="h-3 w-3 mr-1" />
                                {task.dueDate}
                              </span>
                              <span className={`px-2 py-1 rounded-full text-xs font-bold border ${
                                task.priority === 'high' ? 'bg-red-100 text-red-800 border-red-200' :
                                task.priority === 'medium' ? 'bg-yellow-100 text-yellow-800 border-yellow-200' :
                                'bg-blue-100 text-blue-800 border-blue-200'
                              }`}>
                                {task.priority}
                              </span>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            {/* Sidebar */}
            <div className="space-y-8">
              {/* Farm Workers */}
              <div className="relative bg-white/70 backdrop-blur-lg rounded-2xl p-6 border border-white/50 shadow-lg">
                <div className="absolute inset-0 bg-gradient-to-br from-white/60 to-transparent rounded-2xl"></div>
                <div className="relative">
                  <h3 className="text-xl font-bold text-gray-900 mb-6 flex items-center">
                    <div className="p-2 bg-gradient-to-br from-purple-100 to-violet-100 rounded-xl mr-3 border border-purple-200">
                      <Users className="h-6 w-6 text-purple-600" />
                    </div>
                    Farm Workers
                    <span className="ml-3 bg-gradient-to-r from-emerald-100 to-green-100 text-emerald-800 px-3 py-1 rounded-full text-xs font-semibold border border-emerald-200">
                      2 active
                    </span>
                  </h3>
                  <div className="space-y-4">
                    {[
                      { name: 'Raju Kumar', role: 'Head Worker', status: 'active', location: 'Field A', avatar: 'https://t3.ftcdn.net/jpg/06/19/26/46/360_F_619264680_x2PBdGLF54sFe7kTBtAvZnPyXgvaRw0Y.jpg' },
                      { name: 'Sunita Devi', role: 'Assistant', status: 'active', location: 'Storage', avatar: 'https://t3.ftcdn.net/jpg/06/19/26/46/360_F_619264680_x2PBdGLF54sFe7kTBtAvZnPyXgvaRw0Y.jpg' },
                      { name: 'Mohan Singh', role: 'Tractor Driver', status: 'offline', location: 'Village', avatar: 'https://t3.ftcdn.net/jpg/06/19/26/46/360_F_619264680_x2PBdGLF54sFe7kTBtAvZnPyXgvaRw0Y.jpg' }
                    ].map((member, index) => (
                      <div key={index} className="relative bg-white/50 backdrop-blur-sm p-4 rounded-xl border border-white/50 hover:bg-white/70 transition-all duration-300">
                        <div className="flex items-center space-x-4">
                          <div className="relative">
                            <img 
                              src={member.avatar} 
                              alt={member.name}
                              className="w-12 h-12 rounded-full border-2 border-white shadow-md"
                            />
                            <div className={`absolute -bottom-1 -right-1 w-4 h-4 rounded-full border-2 border-white ${member.status === 'active' ? 'bg-emerald-500' : 'bg-gray-400'} shadow-sm`}></div>
                          </div>
                          <div className="flex-1">
                            <p className="text-sm font-semibold text-gray-900">{member.name}</p>
                            <p className="text-xs text-gray-600 font-medium">{member.role}</p>
                            <p className="text-xs text-gray-500 mt-1">{member.location}</p>
                          </div>
                          <div className={`px-2 py-1 rounded-full text-xs font-bold ${
                            member.status === 'active' 
                              ? 'bg-emerald-100 text-emerald-800 border border-emerald-200' 
                              : 'bg-gray-100 text-gray-600 border border-gray-200'
                          }`}>
                            {member.status}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Recent Activities */}
              <div className="relative bg-white/70 backdrop-blur-lg rounded-2xl p-6 border border-white/50 shadow-lg">
                <div className="absolute inset-0 bg-gradient-to-br from-white/60 to-transparent rounded-2xl"></div>
                <div className="relative">
                  <div className="flex items-center justify-between mb-6">
                    <h3 className="text-xl font-bold text-gray-900">Recent Activities</h3>
                    <div className="p-2 bg-gradient-to-br from-gray-100 to-slate-100 rounded-xl border border-gray-200">
                      <Bell className="h-5 w-5 text-gray-600" />
                    </div>
                  </div>
                  <div className="space-y-4">
                    {recentActivities.map((activity) => (
                      <div key={activity.id} className="relative bg-white/50 backdrop-blur-sm p-4 rounded-xl border border-white/50 hover:bg-white/70 transition-all duration-300 group">
                        <div className="flex items-start space-x-4">
                          <div className={`p-2 rounded-xl ${
                            activity.status === 'completed' ? 'bg-gradient-to-br from-emerald-100 to-green-100 border border-emerald-200' :
                            activity.status === 'pending' ? 'bg-gradient-to-br from-yellow-100 to-amber-100 border border-yellow-200' : 
                            'bg-gradient-to-br from-blue-100 to-cyan-100 border border-blue-200'
                          }`}>
                            {activity.icon === 'droplet' && <Droplets className="h-4 w-4 text-blue-600" />}
                            {activity.icon === 'leaf' && <Leaf className="h-4 w-4 text-emerald-600" />}
                            {activity.icon === 'alert' && <AlertCircle className="h-4 w-4 text-yellow-600" />}
                            {activity.icon === 'calendar' && <Calendar className="h-4 w-4 text-blue-600" />}
                          </div>
                          <div className="flex-1">
                            <p className="text-sm font-semibold text-gray-900 mb-1">{activity.action}</p>
                            <p className="text-xs text-gray-500 flex items-center">
                              <Clock className="h-3 w-3 mr-1" />
                              {activity.time}
                            </p>
                          </div>
                          <div className={`px-3 py-1 rounded-full text-xs font-bold border ${
                            activity.status === 'completed' ? 'bg-emerald-100 text-emerald-800 border-emerald-200' :
                            activity.status === 'pending' ? 'bg-yellow-100 text-yellow-800 border-yellow-200' : 
                            'bg-blue-100 text-blue-800 border-blue-200'
                          }`}>
                            {activity.status === 'completed' && <CheckCircle className="h-3 w-3 inline mr-1" />}
                            {activity.status === 'completed' ? 'Complete' : 
                             activity.status === 'pending' ? 'Pending' : 'Scheduled'}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  );
};

export default ModernFarmDashboard;